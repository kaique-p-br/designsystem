<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:18px 24px;background:#fff;box-sizing:border-box;color:#1A1A1A}
  .row{display:grid;grid-template-columns:80px 1fr 160px;gap:14px;align-items:baseline;padding:8px 0;border-bottom:1px solid #F0F0F0}
  .row:last-child{border-bottom:0}
  .tag{font-size:11px;font-weight:700;color:#0077C8;letter-spacing:0.06em;text-transform:uppercase}
  .sample{font-family:"Poppins",sans-serif;color:#F8AD07;font-weight:700;letter-spacing:-0.01em;line-height:1.05}
  .meta{font-size:11px;color:#A8A8A8;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:0.02em}
</style>
</head>
<body>
  <div class="row"><div class="tag">Display</div><div class="sample" style="font-size:56px">Aperte play.</div><div class="meta">Poppins Bold · 56 / 1.1</div></div>
  <div class="row"><div class="tag">H1</div><div class="sample" style="font-size:40px">Sua presença online</div><div class="meta">Poppins Bold · 40 / 1.1</div></div>
  <div class="row"><div class="tag">H2</div><div class="sample" style="font-size:32px">Performance que se vê</div><div class="meta">Poppins Bold · 32 / 1.1</div></div>
  <div class="row"><div class="tag">H3</div><div class="sample" style="font-size:24px">Três passos rápidos</div><div class="meta">Poppins Bold · 24 / 1.25</div></div>
</body>
</html>
