<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:20px 24px;background:#fff;box-sizing:border-box;color:#1A1A1A}
  .head{font-weight:700;font-size:13px;color:#1A1A1A;margin-bottom:10px}
  .grid{display:grid;grid-template-columns:repeat(9,auto);gap:10px;align-items:end}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .block{background:#0077C8;border-radius:4px}
  .lbl{font-size:10.5px;color:#706F6F;font-variant-numeric:tabular-nums;font-weight:700}
  .px{font-size:10px;color:#A8A8A8}
</style>
</head>
<body>
  <div class="head">8pt spacing scale</div>
  <div class="grid">
    <div class="cell"><div class="block" style="width:4px;height:4px"></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="cell"><div class="block" style="width:8px;height:8px"></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="cell"><div class="block" style="width:12px;height:12px"></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="cell"><div class="block" style="width:16px;height:16px"></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="cell"><div class="block" style="width:24px;height:24px"></div><div class="lbl">5</div><div class="px">24</div></div>
    <div class="cell"><div class="block" style="width:32px;height:32px"></div><div class="lbl">6</div><div class="px">32</div></div>
    <div class="cell"><div class="block" style="width:48px;height:48px"></div><div class="lbl">7</div><div class="px">48</div></div>
    <div class="cell"><div class="block" style="width:64px;height:64px"></div><div class="lbl">8</div><div class="px">64</div></div>
    <div class="cell"><div class="block" style="width:96px;height:96px"></div><div class="lbl">9</div><div class="px">96</div></div>
  </div>
</body>
</html>
