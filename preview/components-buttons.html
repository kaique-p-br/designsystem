<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:26px 24px;background:#fff;box-sizing:border-box;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:10.5px;color:#A8A8A8;margin-top:6px;text-align:center;letter-spacing:0.04em;text-transform:uppercase;font-weight:700}
  .stack{display:flex;flex-direction:column;align-items:center}
</style>
</head>
<body>
  <div class="stack"><button class="pw-btn">Comece agora →</button><div class="lbl">Primary</div></div>
  <div class="stack"><button class="pw-btn" style="background:#005E9E">Comece agora →</button><div class="lbl">Hover</div></div>
  <div class="stack"><button class="pw-btn pw-btn--amber">Ver planos</button><div class="lbl">Amber</div></div>
  <div class="stack"><button class="pw-btn pw-btn--ghost">Saiba mais</button><div class="lbl">Ghost</div></div>
  <div class="stack"><button class="pw-btn" style="background:#CFD4DA;color:#8A8A8A;box-shadow:none" disabled>Indisponível</button><div class="lbl">Disabled</div></div>
</body>
</html>
