<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:20px 24px;background:#fff;box-sizing:border-box;display:flex;flex-direction:column;gap:16px}
  .badges{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .badge{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;padding:5px 11px;border-radius:999px;letter-spacing:0.01em}
  .b-info{background:#E6F2FA;color:#0077C8}
  .b-amber{background:#FFF4D1;color:#B6820B}
  .b-ok{background:#E6F6EC;color:#1F8A3A}
  .b-err{background:#FDECEC;color:#C92A2A}
  .b-neutral{background:#F0F1F3;color:#1A1A1A}
  .b-solid{background:#0077C8;color:#fff}
  .b-outline{background:#fff;color:#0077C8;box-shadow:inset 0 0 0 1.5px #0077C8}
  .dot{width:6px;height:6px;border-radius:999px;background:currentColor}
  .eyebrow{font-size:11px;color:#A8A8A8;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="eyebrow">Chips · Badges · Status</div>
  <div class="badges">
    <span class="badge b-info">Novo</span>
    <span class="badge b-amber">Destaque</span>
    <span class="badge b-ok"><span class="dot"></span>Ao vivo</span>
    <span class="badge b-err"><span class="dot"></span>Offline</span>
    <span class="badge b-neutral">Rascunho</span>
    <span class="badge b-solid">Pro</span>
    <span class="badge b-outline">Starter</span>
  </div>
</body>
</html>
