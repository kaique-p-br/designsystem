<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:20px 24px;background:#fff;box-sizing:border-box;color:var(--fg-2)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .sw{border-radius:14px;overflow:hidden;border:1px solid var(--pw-hairline)}
  .chip{height:82px}
  .meta{padding:10px 12px;background:#fff}
  .name{font-weight:700;font-size:13px;color:#1A1A1A;line-height:1.2}
  .hex{font-size:11px;color:var(--pw-muted);margin-top:2px;letter-spacing:0.02em;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0077C8"></div><div class="meta"><div class="name">Blue</div><div class="hex">#0077C8</div></div></div>
    <div class="sw"><div class="chip" style="background:#005E9E"></div><div class="meta"><div class="name">Blue ink</div><div class="hex">#005E9E</div></div></div>
    <div class="sw"><div class="chip" style="background:#E6F2FA"></div><div class="meta"><div class="name">Blue soft</div><div class="hex">#E6F2FA</div></div></div>
    <div class="sw"><div class="chip" style="background:#F8AD07"></div><div class="meta"><div class="name">Amber</div><div class="hex">#F8AD07</div></div></div>
    <div class="sw"><div class="chip" style="background:#F08C00"></div><div class="meta"><div class="name">Amber deep</div><div class="hex">#F08C00</div></div></div>
    <div class="sw"><div class="chip" style="background:#D89105"></div><div class="meta"><div class="name">Amber ink</div><div class="hex">#D89105</div></div></div>
  </div>
</body>
</html>
