<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:20px 24px;background:#fff;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
  .sw{border-radius:12px;overflow:hidden;border:1px solid var(--pw-hairline)}
  .chip{height:64px}
  .meta{padding:8px 10px;background:#fff}
  .name{font-weight:700;font-size:12px;color:#1A1A1A;line-height:1.2}
  .hex{font-size:10.5px;color:var(--pw-muted);margin-top:2px;letter-spacing:0.02em;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="meta"><div class="name">Ink</div><div class="hex">#1A1A1A</div></div></div>
    <div class="sw"><div class="chip" style="background:#706F6F"></div><div class="meta"><div class="name">Body</div><div class="hex">#706F6F</div></div></div>
    <div class="sw"><div class="chip" style="background:#A8A8A8"></div><div class="meta"><div class="name">Muted</div><div class="hex">#A8A8A8</div></div></div>
    <div class="sw"><div class="chip" style="background:#CFD4DA"></div><div class="meta"><div class="name">Border</div><div class="hex">#CFD4DA</div></div></div>
    <div class="sw"><div class="chip" style="background:#E6E6E6"></div><div class="meta"><div class="name">Hairline</div><div class="hex">#E6E6E6</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5F7FA"></div><div class="meta"><div class="name">Surface</div><div class="hex">#F5F7FA</div></div></div>
    <div class="sw"><div class="chip;" style="background:#FFFFFF;box-shadow:inset 0 0 0 1px #E6E6E6"></div><div class="meta"><div class="name">Card</div><div class="hex">#FFFFFF</div></div></div>
  </div>
</body>
</html>
