<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:18px 22px;background:#F5F7FA;box-sizing:border-box}
  .card{
    position:relative;background:#fff;border-radius:20px;padding:22px 24px;
    box-shadow:0 4px 16px rgba(15,23,42,0.08);
    min-height:200px;
  }
  .card::before{content:"";position:absolute;top:14px;right:14px;width:48px;height:36px;
    background:url("../assets/asset-seta.png") no-repeat center/contain}
  .card::after{content:"";position:absolute;bottom:14px;right:14px;width:44px;height:44px;
    background:url("../assets/logo-curta.png") no-repeat center/contain}
  .eyebrow{font-size:11px;color:#0077C8;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
  h3{font-size:22px;font-weight:700;color:#F8AD07;letter-spacing:-0.01em;margin:8px 0 6px;line-height:1.15;max-width:72%}
  p{font-size:14px;color:#706F6F;line-height:1.5;margin:0 0 14px;max-width:78%}
  a{color:#0077C8;font-weight:700;font-size:13px;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Cartão branco · padrão da marca</div>
    <h3>Seta no topo, logo curta embaixo.</h3>
    <p>Todo cartão branco carrega a seta no canto superior direito e o logo curta no inferior direito. O conteúdo respira à esquerda, longe dos brandmarks.</p>
    <a href="#">saiba mais →</a>
  </div>
</body>
</html>
