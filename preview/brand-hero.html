<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:18px 22px;background:#F5F7FA;box-sizing:border-box}
  .hero{position:relative;background:#fff;border-radius:24px;padding:28px 30px;overflow:hidden;min-height:220px;box-shadow:0 4px 16px rgba(15,23,42,0.08)}
  .bg{position:absolute;right:-40px;bottom:-40px;width:320px;height:320px;opacity:0.08;background:url("../assets/asset-seta.png") no-repeat center/contain}
  .eyebrow{font-size:11px;color:#0077C8;font-weight:700;letter-spacing:0.1em;text-transform:uppercase}
  h1{font-size:38px;font-weight:700;color:#F8AD07;letter-spacing:-0.015em;line-height:1.05;margin:10px 0 10px;max-width:60%}
  p{font-size:15px;color:#706F6F;line-height:1.5;margin:0 0 18px;max-width:52%}
  .btns{display:flex;gap:10px;position:relative}
  .btn{font-weight:700;font-size:14px;padding:12px 20px;border-radius:999px;border:0;cursor:pointer}
  .btn.primary{background:#0077C8;color:#fff}
  .btn.ghost{background:transparent;color:#0077C8;box-shadow:inset 0 0 0 1.5px #0077C8}
</style>
</head>
<body>
  <div class="hero">
    <div class="bg"></div>
    <div class="eyebrow">Hero · exemplo de uso</div>
    <h1>Sua presença online, com performance.</h1>
    <p>Três passos rápidos para publicar um site leve, bonito e pronto para ranquear.</p>
    <div class="btns">
      <button class="btn primary">Comece agora →</button>
      <button class="btn ghost">Ver planos</button>
    </div>
  </div>
</body>
</html>
