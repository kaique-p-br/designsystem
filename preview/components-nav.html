<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:16px 20px;background:#F5F7FA;box-sizing:border-box}
  .nav{background:#1A1A1A;border-radius:16px;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;box-shadow:0 4px 16px rgba(15,23,42,0.08)}
  .mark{display:flex;align-items:flex-end;font-weight:700;font-size:24px;letter-spacing:-0.02em;line-height:1;white-space:pre}
  .mark .p1{color:#fff}
  .mark .p2{color:#F8AD07}
  .mark img{height:16px;margin-left:6px;transform:translateY(-4px)}
  .links a{color:#fff;text-decoration:none}
  .links{display:flex;gap:24px;font-size:14px;font-weight:700;color:#fff}
  .links a.active{color:#F8AD07}
  .cta{display:flex;gap:10px;align-items:center}
  .cta .ghost{color:#0077C8;font-weight:700;font-size:14px;text-decoration:none}
  .cta .btn{background:#0077C8;color:#fff;font-weight:700;font-size:14px;padding:10px 18px;border-radius:999px;border:0}
</style>
</head>
<body>
  <div class="nav">
    <div class="mark"><span class="p1">performa</span> <span class="p2">web</span><img src="../assets/asset-seta.png"></div>
    <div class="links"><a class="active" href="#">Início</a><a href="#">Planos</a><a href="#">Recursos</a><a href="#">Contato</a></div>
    <div class="cta"><a class="ghost" href="#">Entrar</a><button class="btn">Comece agora</button></div>
  </div>
</body>
</html>
