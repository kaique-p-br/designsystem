<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;font-family:"Poppins",system-ui,sans-serif}
  body{padding:22px 24px;background:#fff;box-sizing:border-box}
  .row{display:flex;gap:20px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:90px;height:70px;background:#0077C8}
  .lbl{font-size:11px;color:#1A1A1A;font-weight:700}
  .v{font-size:10px;color:#A8A8A8;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">sm</div><div class="v">8px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">md</div><div class="v">12px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="lbl">lg</div><div class="v">20px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:28px"></div><div class="lbl">xl</div><div class="v">28px · hero</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div><div class="v">∞ · buttons</div></div>
  </div>
</body>
</html>
